<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Personal Website</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #e0e0e0;
            background-color: #1a1a1a;
            font-size: 16px;
        }
        
        /* Fluid Typography */
        html {
            font-size: 16px;
        }
        
        @media screen and (min-width: 320px) {
            html {
                font-size: calc(16px + 4 * ((100vw - 320px) / 680));
            }
        }
        
        @media screen and (min-width: 1000px) {
            html {
                font-size: 20px;
            }
        }
        
        /* Container */
        .container {
            width: 92%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Header */
        header {
            background-color: #0a1f44;
            color: #e0e0e0;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        /* Navigation */
        nav ul {
            display: flex;
            list-style: none;
            flex-wrap: wrap;
        }
        
        nav ul li {
            margin-left: 1.2rem;
        }
        
        nav ul li a {
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.9rem;
        }
        
        nav ul li a:hover {
            color: #00d4ff;
        }
        
        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* Success Message Section */
        .success-message {
            padding: 5rem 0;
            background-color: #0a1f44;
            color: #e0e0e0;
            text-align: center;
        }
        
        .success-message h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .success-message p {
            font-size: 1rem;
            max-width: 38rem;
            margin: 0 auto 1.5rem;
        }
        
        .btn {
            display: inline-block;
            background: #00d4ff;
            color: #1a1a1a;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            font-size: 0.8rem;
        }
        
        .btn:hover {
            background: #00a3cc;
        }
        
        /* Footer */
        footer {
            background-color: #0a1f44;
            color: #e0e0e0;
            padding: 2rem 0;
            text-align: center;
            margin-top: auto;
        }
        
        .footer-content p {
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        
        .social-links a {
            color: #e0e0e0;
            font-size: 1rem;
            transition: color 0.3s;
        }
        
        .social-links a:hover {
            color: #00d4ff;
        }
        
        /* Responsive Design - Improved */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            
            nav ul {
                display: none;
                flex-direction: column;
                width: 100%;
                text-align: center;
                padding: 1rem 0;
            }
            
            nav ul.show {
                display: flex;
            }
            
            nav ul li {
                margin: 0.5rem 0;
            }
            
            .header-content {
                flex-direction: column;
            }
            
            .logo {
                margin-bottom: 0.5rem;
            }
            
            .success-message {
                padding: 3rem 0;
            }
            
            .success-message h1 {
                font-size: 1.8rem;
            }
            
            .success-message p {
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .success-message {
                padding: 3rem 0;
            }
            
            .success-message h1 {
                font-size: 1.5rem;
            }
            
            .btn {
                display: block;
                width: 80%;
                margin: 0 auto;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-content">
            <div class="logo">Diego Patterson</div>
            <button class="mobile-menu-btn">☰</button>
            <nav>
                <ul id="menu">
                    <li><a href="frontpage.html">Home</a></li>
                    <li><a href="aboutpage.html">About</a></li>
                    <li><a href="projectpage.html">Projects</a></li>
                    <li><a href="contactpage.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <!-- Success Message Section -->
    <section class="success-message">
        <div class="container">
            <h1>Message Sent Successfully!</h1>
            <p>Thank you for reaching out. Your message has been sent successfully.</p>
            <p>I will get back with you as soon as I can</p>
        </div>
    </section>
    
    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <div class="social-links">
                <!-- Add your social media links here -->
                <a href="https://www.linkedin.com/in/dcpat">LinkedIn</a>
                <a href="https://github.com/DiegoPatterson">GitHub</a>
            </div>
            <p>&copy; 2025 Diego Patterson. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- JavaScript for Mobile Menu Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuBtn = document.querySelector('.mobile-menu-btn');
            const menu = document.getElementById('menu');
            
            menuBtn.addEventListener('click', function() {
                menu.classList.toggle('show');
            });
            
            // Close menu when clicking outside
            document.addEventListener('click', function(event) {
                if (!event.target.closest('nav') && !event.target.closest('.mobile-menu-btn')) {
                    menu.classList.remove('show');
                }
            });
            
            // Adjust menu visibility on window resize
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    menu.classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>
